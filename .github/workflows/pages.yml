# Inspired from https://github.com/actions/starter-workflows/blob/main/pages/nextjs.yml
name: GitHub Pages

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - id: configurepages
        uses: actions/configure-pages@v5
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            .contentlayer
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - run: npm ci
      - run: npm run build
        env:
          INIT_CWD: ${{ github.workspace }}
          EXPORT: 1
          UNOPTIMIZED: 1
          BASE_PATH: /aim-pathology
      - name: Wrap output into /aim-pathology/ subpath
        run: |
          mkdir -p _site/aim-pathology
          cp -r out/* _site/aim-pathology/
          echo 'mmai-lab.com' > _site/CNAME
          cat > _site/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0;url=https://www.monash.edu/it/aimh-lab/people"></head>
            <body></body>
          </html>
          REDIRECT
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # Deployment job
  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
